gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

gesture = $workspaceSwipeFingers, horizontal, workspace
gesture = $gestureFingers, up, special, special
gesture = $gestureFingers, down, special, special
gesture = $gestureFingers, left, dispatcher, movefocus, r
gesture = $gestureFingers, right, dispatcher, movefocus, l
gesture = $gestureFingersMore, down, dispatcher, exec, qs -c noctalia-shell ipc call lockScreen lock
